<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parents Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .announcement {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .announcement h1 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }
        .announcement p {
            margin: 10px 0 0;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="announcement">
        <h1>Welcome Parents!</h1>
        <p>This is where all the parents can find information on what is being taught.</p>
    </div>
</body>
</html>
